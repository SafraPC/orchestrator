name: Verify

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: orchestrator-desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies (Tauri)
        run: |
          sudo apt-get update
          WEBKIT_PKG="libwebkit2gtk-4.1-dev"
          if ! apt-cache show "$WEBKIT_PKG" >/dev/null 2>&1; then
            WEBKIT_PKG="libwebkit2gtk-4.0-dev"
          fi
          sudo apt-get install -y \
            libgtk-3-dev \
            "$WEBKIT_PKG" \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Maven compile (core)
        run: mvn -q -DskipTests compile
        working-directory: orchestrator-core

      - name: npm ci + build (desktop)
        run: |
          npm ci
          npm run build
        working-directory: orchestrator-desktop

      - name: cargo check (tauri)
        run: cargo check
        working-directory: orchestrator-desktop/src-tauri
